<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharityChain | Monitoring Donasi</title>  
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
    <nav class="bg-white border-b border-gray-200 py-4 px-8 flex justify-between items-center shadow-sm">
        <div class="flex items-center">
            <span class="text-2xl font-bold tracking-tight text-blue-600">Charity</span>
            <span class="text-2xl font-bold tracking-tight text-black ml-1">Chain</span>
        </div>
        <button id="connectButton" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full font-semibold transition-all">
            Hubungkan Wallet
        </button>
    </nav>

    <main class="max-w-4xl mx-auto mt-12 px-6 pb-20">
        <div class="text-center mb-12">
            <h2 class="text-4xl font-extrabold mb-4 text-gray-900">Sistem Donasi Berbasis Blockchain</h2>
            <p class="text-gray-600 max-w-lg mx-auto">Transparansi dengan sistem yang terdesentralisasi</p>
        </div>

        <div id="countdownArea" class="mb-8 bg-blue-50 border border-blue-200 p-4 rounded-xl text-center">
            <p class="text-blue-800 font-semibold">Sisa Waktu: <span id="timer">--j --m --d</span></p>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
                <h3 class="text-lg font-bold mb-6 flex items-center"><span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span> Status Donasi</h3>
                <div class="space-y-4">
                    <div><p class="text-sm text-gray-500">Total Terkumpul</p><p id="totalBalance" class="text-3xl font-bold">0.00 ETH</p></div>
                    <div class="w-full bg-gray-100 rounded-full h-3"><div id="progressBar" class="bg-blue-600 h-3 rounded-full transition-all" style="width: 0%"></div></div>
                    <p id="targetStatus" class="text-sm text-gray-600 italic">Memuat data...</p>
                    
                    <button id="withdrawButton" class="hidden w-full mt-4 bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-lg transition-all">
                        Tarik Dana (Owner Only)
                    </button>
                </div>
            </div>

            <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
                <h3 class="text-lg font-bold mb-6 text-gray-900">Kirim Donasi</h3>
                <input type="number" id="amountInput" step="0.01" class="w-full border rounded-lg p-3 mb-3 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Jumlah (ETH)">
                <input type="text" id="messageInput" class="w-full border rounded-lg p-3 mb-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Pesan dukungan (Opsional)">
                <button id="donateButton" class="w-full bg-gray-900 hover:bg-gray-800 text-white font-bold py-3 rounded-lg shadow-lg">Donasi Sekarang</button>
                <p id="accountArea" class="text-xs text-center text-gray-400 mt-4 truncate">Wallet tidak terhubung</p>
            </div>
        </div>

        <div class="mt-12 bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
            <h3 class="text-lg font-bold mb-6 text-gray-900">Riwayat Donatur Terkini</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-gray-400 text-sm border-b">
                            <th class="pb-4">Alamat Wallet</th>
                            <th class="pb-4">Pesan</th>
                            <th class="pb-4 text-right">Jumlah</th>
                        </tr>
                    </thead>
                    <tbody id="donorList"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const contractAddress = "0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0"; 
        const abi = [
            "function donate(string memory _message) payable",
            "function withdrawFunds()",
            "function owner() view returns (address)",
            "function getContractBalance() view returns (uint256)",
            "function targetAmount() view returns (uint256)",
            "function deadline() view returns (uint256)",
            "event Donated(address indexed donor, uint256 amount, string message)"
        ];

        let countdownInterval;

        async function updateUI() {
            if (typeof window.ethereum !== "undefined" && typeof ethers !== "undefined") {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const contract = new ethers.Contract(contractAddress, abi, provider);
                const accounts = await provider.listAccounts();

                try {
                    const balance = await contract.getContractBalance();
                    const target = await contract.targetAmount();
                    const dl = await contract.deadline();
                    const contractOwner = await contract.owner();
                    
                    if (accounts.length > 0 && accounts[0].toLowerCase() === contractOwner.toLowerCase()) {
                        document.getElementById('withdrawButton').classList.remove('hidden');
                    }

                    startCountdown(dl.toNumber());

                    document.getElementById('totalBalance').innerText = ethers.utils.formatEther(balance) + " ETH";
                    const percentage = (parseFloat(ethers.utils.formatEther(balance)) / parseFloat(ethers.utils.formatEther(target))) * 100;
                    document.getElementById('progressBar').style.width = Math.min(percentage, 100) + "%";
                    document.getElementById('targetStatus').innerText = `Target: ${ethers.utils.formatEther(target)} ETH`;

                    const logs = await contract.queryFilter(contract.filters.Donated(), 0, "latest");
                    const list = document.getElementById('donorList');
                    list.innerHTML = "";
                    logs.reverse().forEach(log => {
                        list.innerHTML += `
                            <tr class="border-b last:border-0 text-sm">
                                <td class="py-4 font-mono text-blue-500">${log.args.donor.substring(0,6)}...${log.args.donor.substring(38)}</td>
                                <td class="py-4 text-gray-600 italic">"${log.args.message || '-'}"</td>
                                <td class="py-4 text-right font-bold text-gray-900">${ethers.utils.formatEther(log.args.amount)} ETH</td>
                            </tr>`;
                    });
                } catch (e) { console.error("Update UI Error:", e); }
            }
        }

        function startCountdown(deadlineTimestamp) {
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                const now = Math.floor(Date.now() / 1000);
                const diff = deadlineTimestamp - now;
                if (diff <= 0) {
                    document.getElementById('timer').innerText = "Waktu Habis";
                    clearInterval(countdownInterval);
                    return;
                }
                const days = Math.floor(diff / 86400);
                const hours = Math.floor((diff % 86400) / 3600);
                const mins = Math.floor((diff % 3600) / 60);
                document.getElementById('timer').innerText = `${days}h ${hours}j ${mins}m`;
            }, 1000);
        }

        async function connect() {
            if (typeof window.ethereum !== "undefined") {
                try {
                    const accounts = await ethereum.request({ method: "eth_requestAccounts" });
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    const signer = provider.getSigner();
                    
                    // Verifikasi Tanda Tangan
                    await signer.signMessage(`Verifikasi Login CharityChain\nTimestamp: ${Date.now()}`);
                    
                    document.getElementById("connectButton").innerText = "Terhubung";
                    document.getElementById("connectButton").classList.replace('bg-blue-600', 'bg-green-600');
                    document.getElementById("accountArea").innerText = "Account: " + accounts[0];
                    updateUI();
                } catch (e) { alert("Koneksi/Verifikasi Dibatalkan"); }
            } else {
                alert("Instal MetaMask!");
            }
        }

       async function donate() {
    const amount = document.getElementById("amountInput").value;
    const message = document.getElementById("messageInput").value || "No Message";
    
    const provider = new ethers.providers.Web3Provider(window.ethereum);
    const signer = provider.getSigner();
    const contract = new ethers.Contract(contractAddress, abi, signer);
    
    try {
        const tx = await contract.donate(message, { 
            value: ethers.utils.parseEther(amount),
            // Menambahkan limit gas manual seringkali membantu mengatasi JSON-RPC error
            gasLimit: 100000 
        });
        await tx.wait();
        alert("Donasi Berhasil!");
        updateUI();
    } catch (error) {
        console.error("Detail Error:", error);
        // Menampilkan pesan error spesifik dari Smart Contract
        alert("Gagal: " + (error.data?.message || error.message));
    }try {
        const tx = await contract.donate(message, { 
            value: ethers.utils.parseEther(amount),
            // Naikkan ke 150.000 atau 200.000 untuk menampung data string
            gasLimit: 200000 
        });
        await tx.wait();
        // ...
    } catch (error) {
        console.error(error);
    }
}

        async function withdraw() {
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const signer = provider.getSigner();
            const contract = new ethers.Contract(contractAddress, abi, signer);
            try {
                const tx = await contract.withdrawFunds();
                await tx.wait();
                alert("Dana berhasil ditarik!");
                updateUI();
            } catch (e) { alert("Gagal tarik dana!"); }
        }

        // Event Listeners
        document.getElementById('connectButton').addEventListener('click', connect);
        document.getElementById('donateButton').addEventListener('click', donate);
        document.getElementById('withdrawButton').addEventListener('click', withdraw);
        window.addEventListener('load', updateUI);
    </script>
</body>
</html>
